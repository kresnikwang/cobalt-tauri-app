name: Release Draft Creator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: 'Cobalt Desktop ${{ github.ref_name }}'
          body: |
            Cobalt Desktop Release ${{ github.ref_name }}.
            
            ### Installation
            - **macOS**: Download the `.dmg` or `.app.zip` below (compiled locally).
            
            *Note: To run the app on macOS, you may need to right-click the app and choose "Open" to bypass gatekeeper warnings.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
